<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIRATE GAMES</title>
    <style>
        /* General Reset & Theme */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f111a;
            color: #ffffff;
            min-height: 100vh;
            padding-bottom: 60px;
        }

        header {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header p {
            color: #ddd;
            font-size: 1.1rem;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Control Panel / Upload Trigger */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn {
            background-color: #ff2449;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .btn:hover {
            background-color: #ff4765;
            transform: translateY(-2px);
        }

        /* Games Grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* Game Card */
        .game-card {
            background-color: #1a1d29;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(255, 36, 73, 0.2);
        }

        .game-thumb {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #2a2e3f;
        }

        .game-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .game-title {
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: #fff;
        }

        .game-desc {
            color: #a0a5b5;
            font-size: 0.95rem;
            line-height: 1.4;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .play-link {
            display: inline-block;
            background-color: #00bcd4;
            color: #fff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .play-link:hover {
            background-color: #00e5ff;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .delete-btn:hover {
            text-decoration: underline;
        }

        /* Modal styling for the upload form */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #1a1d29;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #a0a5b5;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            background-color: #0f111a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 1rem;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #ff2449;
        }
    </style>
</head>
<body>

    <header>
        <h1>Pirates Games</h1>
        <p>una pagina para que descargues juegos 100% gratis</p>
        <p>no tiene virus ningun jueo que se monte a esta pagina ya que yo comprebo cada app</p>
    </header>

    <div class="container">
        <div class="controls">
            <h2>All Games</h2>
            <button class="btn" id="open-modal-btn">Add New Game</button>
        </div>

        <!-- The dynamic games grid -->
        <div class="games-grid" id="games-grid">
            <!-- Game cards will be generated here by JavaScript -->
        </div>
    </div>

    <!-- Upload Game Modal -->
    <div class="modal" id="upload-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Upload/Add Game Information</h3>
                <button class="close-btn" id="close-modal-btn">&times;</button>
            </div>
            <form id="game-form">
                <div class="form-group">
                    <label for="game-title">Game Title</label>
                    <input type="text" id="game-title" required placeholder="e.g. Space Invaders Retro">
                </div>
                <div class="form-group">
                    <label for="game-desc">Description</label>
                    <textarea id="game-desc" rows="3" required placeholder="Describe your game features..."></textarea>
                </div>
                <div class="form-group">
                    <label for="game-thumb">Thumbnail Image URL</label>
                    <input type="url" id="game-thumb" placeholder="https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400">
                </div>
                <div class="form-group">
                    <label for="game-url">Play / Download Link (URL)</label>
                    <input type="url" id="game-url" required placeholder="e.g. itch.io link or GitHub page">
                </div>
                <button type="submit" class="btn" style="width: 100%;">Save Game</button>
            </form>
        </div>
    </div>

    <script>
        // DOM Elements
        const openModalBtn = document.getElementById('open-modal-btn');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const uploadModal = document.getElementById('upload-modal');
        const gameForm = document.getElementById('game-form');
        const gamesGrid = document.getElementById('games-grid');

        // Default placeholder games if none exist
        const defaultGames = [
            {
                id: 1,
                title: "Cyber Rush 2026",
                desc: "An action-packed arcade game built with HTML5 Canvas. Dodge obstacles and set the ultimate highscore.",
                thumb: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400",
                url: "#"
            }
        ];

        // Load games from localStorage or use defaults
        let games = JSON.parse(localStorage.getItem('myGames')) || defaultGames;

        // Render Games to Grid
        function renderGames() {
            gamesGrid.innerHTML = '';
            
            if (games.length === 0) {
                gamesGrid.innerHTML = '<p style="color: #a0a5b5; grid-column: 1/-1; text-align: center;">No games uploaded yet. Click "Add New Game"!</p>';
                return;
            }

            games.forEach(game => {
                const gameCard = document.createElement('div');
                gameCard.className = 'game-card';
                
                // Use a default thumbnail if none provided
                const thumbImg = game.thumb || 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400';

                gameCard.innerHTML = `
                    <img src="${thumbImg}" alt="${game.title}" class="game-thumb">
                    <div class="game-info">
                        <h3 class="game-title">${game.title}</h3>
                        <p class="game-desc">${game.desc}</p>
                        <div class="card-actions">
                            <a href="${game.url}" target="_blank" class="play-link">Play Game</a>
                            <button class="delete-btn" onclick="deleteGame(${game.id})">Remove</button>
                        </div>
                    </div>
                `;
                gamesGrid.appendChild(gameCard);
            });
        }

        // Add Game
        gameForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const newGame = {
                id: Date.now(), // Unique ID
                title: document.getElementById('game-title').value,
                desc: document.getElementById('game-desc').value,
                thumb: document.getElementById('game-thumb').value,
                url: document.getElementById('game-url').value
            };

            games.push(newGame);
            localStorage.setItem('myGames', JSON.stringify(games));
            renderGames();
            
            // Close modal & reset form
            uploadModal.style.display = 'none';
            gameForm.reset();
        });

        // Delete Game
        window.deleteGame = function(id) {
            if (confirm("Are you sure you want to remove this game?")) {
                games = games.filter(game => game.id !== id);
                localStorage.setItem('myGames', JSON.stringify(games));
                renderGames();
            }
        };

        // Modal Controls
        openModalBtn.addEventListener('click', () => uploadModal.style.display = 'flex');
        closeModalBtn.addEventListener('click', () => uploadModal.style.display = 'none');
        window.addEventListener('click', (e) => {
            if (e.target === uploadModal) uploadModal.style.display = 'none';
        });

        // Initial Run
        renderGames();
    </script>
</body>
</html>
